# Template used https://superface.ai/blog/npm-publish-gh-actions-changelog
name: Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Version to release (follow SemVer e.g. 1.0.0)'
        required: true

permissions:
  contents: write
  pull-requests: write

env:
  NODE_VERSION: 22.x

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Git configuration
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "Github Actions on behalf of @${{ github.triggering_actor }}"
      - name: Bump Release Version
        run: |
          npm ci
          npx nx release --skip-publish ${{ github.event.inputs.release_version }}
      - name: Push Changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git checkout -b release/${{ github.event.inputs.release_version }}
          git push --tags origin release/${{ github.event.inputs.release_version }}
      - name: Merge Release Data via Pull Request
        uses: actions/github-script@v9
        with:
          script: |
            const { repo, owner } = context.repo;
            const result = await github.rest.pulls.create({
              title: 'Release ${{ github.event.inputs.release_version }}',
              owner,
              repo,
              head: 'release/${{ github.event.inputs.release_version }}',
              base: 'main',
              body: [
                'Adds release data',
                'This PR is auto-generated by',
                '[actions/github-script](https://github.com/actions/github-script).'
              ].join('\n')
            });
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: result.data.number,
              labels: ['release', 'automated pr']
            });
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.release_version }}
          generate_release_notes: true

  build:
    needs: [github-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ github.event.inputs.release_version }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: release-dist
          path: packages/*/dist/
          retention-days: 1

  publish-package:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ github.event.inputs.release_version }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          scope: '@lion5'
          registry-url: 'https://npm.pkg.github.com'
      - run: npm ci
      - uses: actions/download-artifact@v8
        with:
          name: release-dist
          path: packages/
      - name: Publish To Github Packages
        run: npx nx release publish --registry https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          scope: '@lion5'
          registry-url: 'https://registry.npmjs.org'
      - name: Publish To NPM Packages
        run: npx nx release publish --registry https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-documentation:
    needs: [build]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ github.event.inputs.release_version }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v8
        with:
          name: release-dist
          path: packages/
      - run: npm run docs:build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v4
        with:
          path: './packages/storybook-host/storybook-static/'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
